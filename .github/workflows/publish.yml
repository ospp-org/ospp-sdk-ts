# Publish @ospp/protocol to npm on tag push.
#
# Closes the asymmetry with ospp-sdk-php, which Packagist auto-publishes
# from GitHub tags via webhook. npm has no equivalent — without this
# workflow, a `git push --tags` lands on GitHub but never reaches the
# npm registry (the gap that left v0.5.0..v0.5.2 unpublished for weeks
# until manual catch-up on 2026-06-07).
#
# REQUIRED REPO SECRET — NPM_TOKEN
# Set in Settings → Secrets and variables → Actions → New repository secret.
# Generate a Granular Access Token at https://www.npmjs.com/settings/<user>/tokens
# with:
#   - Permissions: Read and write (on @ospp/protocol package)
#   - Expiration: as policy dictates (renewable)
# This workflow CANNOT publish until the secret is set; the publish step
# will fail with a 401 from the npm registry.
#
# Provenance: `--provenance` attaches a signed SLSA attestation linking
# the tarball to this workflow run + the source commit. Free for public
# packages on GitHub-hosted runners. Requires `id-token: write` permission.

name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build, test, and publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      # Guard against the npm-403 trap: a tag push where package.json was
      # never bumped to match the tag. `npm publish` reads the version from
      # package.json (NOT the tag), so a stale package.json silently
      # republishes an already-published version and npm rejects it with a
      # 403 — after wasting the whole build+test. This cost ~2 days at
      # v0.6.0/v0.6.1 (tags cut without a package.json bump). Runs BEFORE
      # npm ci/build/test so the mismatch fails loud and fast.
      - name: Guard — package.json version matches release tag
        run: |
          set -euo pipefail
          tag="$GITHUB_REF_NAME"
          expected="${tag#v}"
          actual="$(node -p "require('./package.json').version")"
          if [ "$actual" != "$expected" ]; then
            echo "ERROR: package.json version '$actual' does not match release tag '$tag' (expected version '$expected')." >&2
            echo "Fix: bump package.json + package-lock.json + CHANGELOG to '$expected' BEFORE tagging, then move/re-push the tag." >&2
            exit 1
          fi
          echo "OK — package.json version '$actual' matches release tag '$tag'."

      - run: npm ci

      - run: npm run build

      # Re-runs the same test suite the CI workflow already ran on main
      # before this tag was cut. Cheap reproducibility insurance: catches
      # the rare case where the tag points at a commit that no longer
      # builds/tests cleanly under the resolved lockfile state.
      - run: npm test

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
